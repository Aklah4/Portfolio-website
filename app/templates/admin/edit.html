{% extends "admin/base.html" %}

{% block title %}Edit Contact — Admin{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-800 mb-6">Edit Contact</h1>

<div class="bg-white rounded-xl shadow p-6 max-w-xl">
  <form method="POST" action="{{ url_for('admin.update', id=user.id) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-4">
      <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
      <input type="text" id="name" name="name" value="{{ user.name }}"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-gray-800">
    </div>

    <div class="mb-4">
      <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" id="email" name="email" value="{{ user.email }}"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-gray-800">
    </div>

    <div class="mb-4">
      <label for="subject" class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
      <input type="text" id="subject" name="subject" value="{{ user.subject }}"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-gray-800">
    </div>

    <div class="mb-6">
      <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Message</label>
      <textarea id="message" name="message" rows="5"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-gray-800">{{ user.message }}</textarea>
    </div>

    <div class="flex items-center gap-3">
      <button type="submit"
              class="bg-gray-900 text-white text-sm font-medium px-5 py-2 rounded-lg hover:bg-gray-700 transition-colors">
        Save Changes
      </button>
      <a href="{{ url_for('admin.read') }}"
         class="text-sm text-gray-500 hover:text-gray-800 transition-colors">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
