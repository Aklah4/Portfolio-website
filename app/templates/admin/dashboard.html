{% extends "admin/base.html" %}

{% block title %}Dashboard — Admin{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-800 mb-6">Dashboard</h1>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
  <div class="bg-white rounded-xl shadow p-6">
    <p class="text-sm text-gray-500 uppercase tracking-wide font-medium mb-1">Total Contacts</p>
    <p class="text-4xl font-bold text-gray-900">{{ count }}</p>
    <a href="{{ url_for('admin.read') }}"
       class="mt-4 inline-block bg-gray-900 text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-gray-700 transition-colors">
      View Contacts
    </a>
  </div>

  <div class="bg-white rounded-xl shadow p-6">
    <p class="text-sm text-gray-500 uppercase tracking-wide font-medium mb-1">Projects</p>
    <p class="text-4xl font-bold text-gray-900">{{ project_count }}</p>
    <a href="{{ url_for('admin.projects_list') }}"
       class="mt-4 inline-block bg-gray-900 text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-gray-700 transition-colors">
      Manage Projects
    </a>
  </div>
</div>
{% endblock %}
