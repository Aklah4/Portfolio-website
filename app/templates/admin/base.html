<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  {% if current_user.is_authenticated %}
  <nav class="bg-gray-900 text-white px-6 py-4 flex items-center gap-6">
    <span class="font-semibold text-lg mr-auto">Admin Panel</span>
    <a href="{{ url_for('admin.dashboard') }}" class="hover:text-gray-300 transition-colors">Dashboard</a>
    <a href="{{ url_for('admin.projects_list') }}" class="hover:text-gray-300 transition-colors">Projects</a>
    <a href="{{ url_for('admin.read') }}" class="hover:text-gray-300 transition-colors">Contacts</a>
    <a href="{{ url_for('admin.logout') }}" class="hover:text-gray-300 transition-colors">Logout</a>
  </nav>
  {% endif %}

  <main class="p-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
